name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build frontend
        run: npm run build

      - name: Print Tauri environment info
        run: npm run tauri -- info

      - name: Tauri build smoke (no bundle)
        run: npm run tauri -- build --no-bundle

      - name: Diagnostics on failure
        if: failure()
        shell: bash
        run: |
          echo "node: $(node -v)"
          echo "npm: $(npm -v)"
          rustc --version || true
          cargo --version || true
          rustup show || true
          npm run tauri -- info || true

  package-linux:
    name: Package Linux (deb + rpm)
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Install dependencies
        run: npm ci

      - name: Build deb/rpm packages
        run: npm run pack:linux

      - name: Upload Linux package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: error

      - name: Diagnostics on failure
        if: failure()
        shell: bash
        run: |
          echo "node: $(node -v)"
          echo "npm: $(npm -v)"
          rustc --version || true
          cargo --version || true
          rustup show || true
          npm run tauri -- info || true

  package-windows:
    name: Package Windows (nsis)
    runs-on: windows-latest
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer (nsis)
        run: npm run pack:win

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Diagnostics on failure
        if: failure()
        shell: bash
        run: |
          echo "node: $(node -v)"
          echo "npm: $(npm -v)"
          rustc --version || true
          cargo --version || true
          rustup show || true
          npm run tauri -- info || true
